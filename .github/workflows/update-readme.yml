name: 📊 Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 0 * * *"      # Runs every day at midnight UTC
  workflow_dispatch:           # Manual trigger from Actions tab
  push:
    branches: [main]

jobs:
  generate-stats:
    name: Generate & Commit Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📁 Create assets folder
        run: mkdir -p assets

      # ── Stats Card ──────────────────────────────────────────────────────────
      - name: 📈 Generate Stats Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ayushsharma1908
          template: classic
          base: header, activity, community, repositories
          output_action: none
          filename: assets/stats.svg
          config_timezone: Asia/Kolkata
          plugin_isocalendar: no
          config_display: large

      # ── Top Languages Card ──────────────────────────────────────────────────
      - name: 🗣️ Generate Languages Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ayushsharma1908
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          output_action: none
          filename: assets/langs.svg

      # ── Repo Pin: RepoLens ──────────────────────────────────────────────────
      - name: 📌 Generate RepoLens Pin
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ayushsharma1908
          template: repository
          repo: Repolens
          output_action: none
          filename: assets/pin-repolens.svg

      # ── Repo Pin: hear-me-out ───────────────────────────────────────────────
      - name: 📌 Generate Hear-Me-Out Pin
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ayushsharma1908
          template: repository
          repo: hear-me-out
          output_action: none
          filename: assets/pin-hearmeout.svg

      # ── Snake Animation ─────────────────────────────────────────────────────
      - name: 🐍 Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Ayushsharma1908
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: 📤 Push Snake to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Commit all generated SVGs ───────────────────────────────────────────
      - name: 💾 Commit generated assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update profile stats SVGs [automated]"
          file_pattern: "assets/*.svg"
